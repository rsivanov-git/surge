#!MANAGED-CONFIG https://raw.githubusercontent.com/rsivanov-git/surge/main/Default.conf
[General]
loglevel = warning
udp-policy-not-supported-behaviour = REJECT
encrypted-dns-server = https://dns.nextdns.io
dns-server = system

[Proxy Group]
PROXY = select, DIRECT, REJECT

[Host]
ntc.party = 130.255.77.28
RULE-SET,https://raw.githubusercontent.com/rsivanov-git/surge/main/Direct.txt = server:system
RULE-SET,https://surge.bojin.co/geosite/full/category-ru = server:system

[Rule]
RULE-SET,SYSTEM,DIRECT
RULE-SET,LAN,DIRECT,no-resolve
DOMAIN,dns.nextdns.io,DIRECT
DOMAIN,doh.cleanbrowsing.org,DIRECT
DOMAIN,_test.local,REJECT,pre-matching
RULE-SET,https://raw.githubusercontent.com/rsivanov-git/surge/main/Proxied.txt,PROXY
RULE-SET,https://surge.bojin.co/geosite/full/apple,DIRECT
RULE-SET,https://raw.githubusercontent.com/rsivanov-git/surge/main/Direct.txt,DIRECT
# Russia
RULE-SET,https://surge.bojin.co/geosite/full/category-ru,DIRECT
GEOIP,RU,DIRECT,no-resolve
# Final
FINAL,PROXY
